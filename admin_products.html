<!doctype html>
<html>
<head>
<title>All Products | Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{background:#c6aa58}</style>
</head>

<body>

<!-- Messages with Auto-Fade -->
{% if messages %}
  {% for message in messages %}
    <div class="auto-fade-message mb-4 p-4 rounded-lg text-center font-medium
      {% if message.tags == 'success' %}bg-green-100 text-green-800
      {% elif message.tags == 'error' %}bg-red-100 text-red-800
      {% elif message.tags == 'warning' %}bg-yellow-100 text-yellow-800
      {% elif message.tags == 'info' %}bg-blue-100 text-blue-800
      {% else %}bg-gray-100 text-gray-800{% endif %}">
      {{ message }}
    </div>
  {% endfor %}
  <script>
    setTimeout(function() {
      document.querySelectorAll('.auto-fade-message').forEach(function(msg) {
        msg.style.transition = 'opacity 1s';
        msg.style.opacity = '0';
        setTimeout(function() { msg.remove(); }, 1000);
      });
    }, 3000);
  </script>
{% endif %}

<nav class="bg-[#FFFBF5] p-4 flex justify-between">
<a href="{% url 'admin_dashboard' %}" class="bg-green-900 text-white px-4 py-2 rounded">← Back</a>
<h1 class="text-xl font-bold">All Products</h1>
</nav>

<div class="max-w-6xl mx-auto mt-10 grid md:grid-cols-3 gap-8">

{% for product in products %}

<div class="bg-white p-6 rounded-xl shadow">
<img src="{{ product.image.url }}" class="h-40 w-full object-cover rounded">
<h2 class="font-bold mt-2">{{ product.name }}</h2>
<p class="text-sm text-gray-600">{{ product.category }}</p>
<p class="text-green-700 font-semibold">₹{{ product.price }}</p>
<p class="text-sm">Seller: {{ product.seller.username }}</p>
<p class="text-sm">Status: {{ product.status }}</p>
</div>

{% endfor %}

</div>

</body>
</html>
