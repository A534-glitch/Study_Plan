<!doctype html>
<html>
<head>
<title>My Bargains</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{background:#c6aa58}</style>
</head>

<body>

<nav class="bg-[#FFFBF5] p-4 flex justify-between">
<a href="{% url 'student_home' %}" class="bg-green-900 text-white px-4 py-2 rounded">
← Back
</a>
<h1 class="text-xl font-bold">My Bargains</h1>
</nav>

<div class="max-w-5xl mx-auto mt-10 space-y-6">

{% for b in bargains %}

<a href="{% url 'bargain_history' b.id %}">
<div class="bg-white p-6 rounded-xl shadow hover:bg-green-50 cursor-pointer">

    <div class="flex items-center gap-5">

        <img src="{{ b.product.image.url }}" class="w-24 h-24 rounded-lg object-cover">

        <div class="flex-1">
            <h2 class="text-xl font-bold">{{ b.product.name }}</h2>
            <p class="text-gray-600">Original: ₹{{ b.product.price }}</p>

            <div class="mt-2">
                <span class="text-blue-700">You: ₹{{ b.student_price }}</span>

                {% if b.alumni_price %}
                <span class="ml-4 text-green-700">Alumni: ₹{{ b.alumni_price }}</span>
                {% endif %}
            </div>
        </div>

        <span class="px-3 py-1 rounded bg-yellow-200">
            {{ b.status }}
        </span>

    </div>

</div>
</a>

{% empty %}

<div class="bg-white p-10 rounded-xl text-center">
    <h2 class="text-2xl font-bold">No Bargains Yet</h2>
    <p class="text-gray-600 mt-2">Start bargaining from search page</p>
</div>

{% endfor %}

</div>

</body>
</html>
