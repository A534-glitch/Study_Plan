<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Counter Bargain | StudyShare</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#c6aa58;
    font-family:'DM Sans',sans-serif;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="bg-[#FFFBF5] p-4 flex justify-between items-center">
    <a href="{% url 'product_requests' bargain.product.id %}"
       class="bg-green-900 text-white px-4 py-2 rounded">
       ← Back to Requests
    </a>

    <h1 class="text-xl font-bold">Counter Offer</h1>
</nav>


<!-- CONTENT -->
<div class="max-w-xl mx-auto mt-10 bg-white p-8 rounded-2xl shadow">

    <h2 class="text-2xl font-bold mb-6 text-center">
        {{ bargain.product.name }}
    </h2>

    <div class="space-y-3 text-center mb-6">
        <p>Original Price: <b>₹{{ bargain.product.price }}</b></p>
        <p>Student Offer: <b class="text-blue-600">₹{{ bargain.student_price }}</b></p>
    </div>

    <form method="POST">
        {% csrf_token %}

        <label class="font-semibold">Your Counter Price</label>
        <input type="number" name="counter_price" required
               class="w-full border p-3 rounded mt-2">

        <button class="w-full bg-orange-500 text-white py-3 mt-6 rounded-xl">
            Send Counter Offer
        </button>
    </form>

</div>

</body>
</html>
